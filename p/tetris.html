<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            overflow-x: hidden;
            background: radial-gradient(ellipse at center, #111 0%, #000 100%);
            font-family: 'Press Start 2P', cursive;
            color: white;
        }

        .tetris-header {
            font-size: 2rem;
            margin-top: 40px;
            text-align: center;
            text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff;
            }
            to {
                text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
                color: #ff00ff;
            }
        }

        .game-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px auto;
            position: relative;
            z-index: 2;
        }

        .game-container {
            border: 6px solid #ffcc00;
            box-shadow: 0 0 40px #ffcc00;
            background-color: #222;
            border-radius: 16px;
            overflow: hidden;
            z-index: 3;
        }

        iframe {
            display: block;
            border: none;
            border-radius: 10px;
        }

        footer {
            color: #888;
            font-size: 0.75rem;
            text-align: center;
            padding: 15px;
        }

        /* Falling Tetris Blocks */
        .tetris-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .block {
            position: absolute;
            width: 40px;
            height: 40px;
            opacity: 0.4;
            animation: fall linear infinite;
        }

        .block::before {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            background-color: currentColor;
            box-shadow: inset 0 0 5px #000;
        }

        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg);
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        /* Colors and animation delays */
        .block1 { left: 5%;  color: #00ffff; animation-duration: 12s; animation-delay: 0s; }
        .block2 { left: 20%; color: #ff00ff; animation-duration: 10s; animation-delay: 1s; }
        .block3 { left: 35%; color: #00ff00; animation-duration: 14s; animation-delay: 2s; }
        .block4 { left: 50%; color: #ffcc00; animation-duration: 11s; animation-delay: 3s; }
        .block5 { left: 65%; color: #ff3333; animation-duration: 13s; animation-delay: 4s; }
        .block6 { left: 80%; color: #ffffff; animation-duration: 15s; animation-delay: 2.5s; }
        .block7 { left: 90%; color: #9900ff; animation-duration: 16s; animation-delay: 1.5s; }
    </style>
</head>
<body>
    <!-- Animated falling blocks -->
    <div class="tetris-bg">
        <div class="block block1"></div>
        <div class="block block2"></div>
        <div class="block block3"></div>
        <div class="block block4"></div>
        <div class="block block5"></div>
        <div class="block block6"></div>
        <div class="block block7"></div>
    </div>

    <div class="tetris-header">▶Can you master the fall?◀</div>

    <div class="game-wrapper">
        <div class="game-container">
            <iframe id="gameFrame" width="1060" height="650"
                src="https://www.onlinegames.io/games/2024/more/tetris/index.html"
                scrolling="no"
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <footer>
        © 2025 EP DAMP Team | Tetris
    </footer>
</body>
</html>
