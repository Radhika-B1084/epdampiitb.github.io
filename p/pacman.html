<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pacman</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      background-color: #000;
      font-family: 'Press Start 2P', cursive;
      color: #fffb00;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .pac-header {
      text-align: center;
      font-size: 2rem;
      margin-top: 40px;
      color: #fffb00;
      text-shadow: 0 0 10px #ffff00, 0 0 20px #ffcc00;
      animation: flicker 2s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 0.9; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .game-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px auto;
      position: relative;
      z-index: 2;
    }

    .game-container {
      border: 6px solid #00bfff;
      box-shadow: 0 0 40px #00bfff;
      border-radius: 20px;
      background-color: #111;
      overflow: hidden;
    }

    iframe {
      display: block;
      border: none;
      border-radius: 10px;
    }

    footer {
      color: #888;
      font-size: 0.7rem;
      text-align: center;
      padding: 15px;
    }

    /* Animated Background Dots Only */
    .pacman-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      animation: moveDot 15s linear infinite;
    }

    @keyframes moveDot {
      0% { transform: translateX(-100px); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateX(110vw); opacity: 0; }
    }

    .dot:nth-child(1) { top: 20%; animation-delay: 0s; }
    .dot:nth-child(2) { top: 40%; animation-delay: 3s; }
    .dot:nth-child(3) { top: 60%; animation-delay: 6s; }
    .dot:nth-child(4) { top: 80%; animation-delay: 9s; }
  </style>
</head>
<body>

  <!-- Animated background with dots only -->
  <div class="pacman-bg">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Header -->
  <div class="pac-header">◉ Eat. Dodge. Win. Repeat. ◉</div>

  <!-- Game Embed -->
  <div class="game-wrapper">
    <div class="game-container">
      <iframe id="gameFrame" width="1060" height="900"
        src="https://www.onlinegames.io/games/2024/more/tapman/index.html"
        scrolling="no" allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    © 2025 EP DAMP TEAM | PACMAN
  </footer>

</body>
</html>
