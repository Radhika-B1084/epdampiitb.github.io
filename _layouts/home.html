<style>
.button-container {
    position: relative;
    display: inline-block;
}

.cat-image {
    position: absolute;
    top: -39px;
    left: 5%;
    transform: translateX(-50%);
    width: 60px;
    cursor: pointer;
    z-index: 5;
    transition: transform 0.3s ease;
}

.cat-image:hover {
    transform: translateX(-50%) scale(1.2) rotate(-12deg);
}
